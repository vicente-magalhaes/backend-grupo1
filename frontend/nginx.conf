# CNH Connect — nginx: serve o app (SPA) e faz proxy reverso para a API.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html (roteamento no cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Repassa as chamadas de API ao contêiner `backend` pela rede interna do Compose.
    # É aqui que a comunicação por nome de serviço (http://backend:8000) acontece.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
